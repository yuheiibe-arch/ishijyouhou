<!DOCTYPE html>
<html>
  <head>
    <base target="_top">
    <style>
      body { font-family: "Helvetica Neue", Arial, sans-serif; padding: 20px; color: #333; line-height: 1.5; background-color: #fff; }
      .container { display: flex; flex-direction: column; gap: 15px; }
      .section { border: 1px solid #ddd; padding: 15px; border-radius: 8px; background: #f9f9f9; }
      label { font-weight: bold; display: block; margin-bottom: 5px; font-size: 14px; }
      select, input { padding: 10px; width: 100%; box-sizing: border-box; border: 1px solid #ccc; border-radius: 4px; font-size: 14px; margin-bottom: 10px; }
      select:focus, input:focus { border-color: #4285f4; outline: none; }
      .btn { padding: 10px 15px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 14px; transition: 0.2s; }
      .btn-add { background-color: #34a853; color: white; width: 100%; }
      .btn-add:hover { background-color: #2d8e47; }
      .btn-submit { background-color: #4285f4; color: white; width: 100%; margin-top: 10px; padding: 12px; font-size: 15px;}
      .btn-submit:hover { background-color: #357ae8; }
      .btn-submit:disabled { background-color: #ccc; cursor: not-allowed; }
      #preview-list { list-style: none; padding: 0; max-height: 180px; overflow-y: auto; border: 1px solid #eee; background: white; border-radius: 4px;}
      .preview-item { padding: 10px 12px; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; align-items: center; font-size: 13px; }
      .preview-item:last-child { border-bottom: none; }
      .remove-btn { color: #d93025; cursor: pointer; font-weight: bold; padding: 4px 8px; border-radius: 4px; background: #fce8e6; }
      .remove-btn:hover { background: #fad2cf; }
      .count-badge { font-size: 12px; background: #4285f4; color: white; padding: 2px 8px; border-radius: 10px; float: right; }
      .note { font-size: 11px; color: #666; margin-top: -5px; margin-bottom: 10px; display: block;}
    </style>
  </head>
  <body>
    <div class="container">
      <div class="section">
        <label>1. エリアを選択</label>
        <select id="area">
          <option value="千葉">千葉</option>
          <option value="埼玉">埼玉</option>
          <option value="大阪">大阪</option>
          <option value="神奈川">神奈川</option>
          <option value="関東第一">関東第一</option>
          <option value="関東第二">関東第二</option>
        </select>
        
        <label>2. 拠点名を入力（複数追加可能）</label>
        <span class="note">※「【】」は自動で付くので入力不要です（例: 船橋）</span>
        <input type="text" id="locName" placeholder="拠点名を入力してEnter" onkeypress="handleKey(event)">
        
        <button class="btn btn-add" onclick="addToList()">↓ リストに追加する</button>
      </div>

      <div class="section">
        <label>追加予定リスト <span id="count" class="count-badge">0</span></label>
        <div id="preview-list">
          <div style="padding: 15px; text-align: center; color: #999; font-size: 12px;">追加待ちの拠点はありません</div>
        </div>
      </div>

      <button id="submitBtn" class="btn btn-submit" onclick="runProcess()" disabled>マスターとフォームを最新化する</button>
    </div>

    <script>
      let list = [];

      function handleKey(e) {
        if (e.key === 'Enter') {
          e.preventDefault();
          addToList();
        }
      }

      function addToList() {
        const area = document.getElementById('area').value;
        const name = document.getElementById('locName').value.trim();
        if (!name) return;

        list.push({ area: area, name: name });
        document.getElementById('locName').value = '';
        document.getElementById('locName').focus();
        render();
      }

      function remove(index) {
        list.splice(index, 1);
        render();
      }

      function render() {
        const container = document.getElementById('preview-list');
        container.innerHTML = '';
        
        if (list.length === 0) {
           container.innerHTML = '<div style="padding: 15px; text-align: center; color: #999; font-size: 12px;">追加待ちの拠点はありません</div>';
        } else {
          list.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'preview-item';
            div.innerHTML = `<span><strong>【${item.area}】</strong>${item.name}</span><span class="remove-btn" onclick="remove(${idx})">× 削除</span>`;
            container.appendChild(div);
          });
        }

        document.getElementById('count').innerText = list.length;
        document.getElementById('submitBtn').disabled = list.length === 0;
      }

      function runProcess() {
        const btn = document.getElementById('submitBtn');
        btn.disabled = true;
        btn.innerText = '処理中... そのままお待ちください';

        google.script.run
          .withSuccessHandler(res => {
            alert(res);
            google.script.host.close();
          })
          .withFailureHandler(err => {
            alert('エラーが発生しました: ' + err);
            btn.disabled = false;
            btn.innerText = 'マスターとフォームを最新化する';
          })
          .processNewLocations(list);
      }
    </script>
  </body>
</html>
